<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0d0d0d;display:flex;justify-content:center;padding:30px 20px;}
.wrap{background:#0d0d0d;padding:24px 16px;font-family:'Segoe UI',sans-serif;width:380px;}
.label-top{text-align:center;font-size:10px;letter-spacing:3px;color:#444;font-family:monospace;margin-bottom:18px;}
.node{border-radius:8px;padding:9px 16px;text-align:center;}
.title{font-size:13px;font-weight:600;color:#f0f0f0;}
.sub{font-size:11px;color:#888;margin-top:3px;}
.n-gray{background:#1a1a1a;border:0.8px solid #444;}
.n-teal{background:#0f2e26;border:0.8px solid #1D9E75;}
.n-purple{background:#1a1030;border:0.8px solid #534ab7;}
.n-blue{background:#0a1a2e;border:0.8px solid #185fa5;}
.n-green{background:#0f2a0a;border:0.8px solid #3b6d11;}
.n-lg{background:#0e0c1a;border:0.8px solid #3a3480;border-radius:10px;padding:14px;}
.arr-y{color:#FFD700;font-size:14px;font-weight:700;text-align:center;}
.vline{width:1px;min-height:14px;background:#FFD700;opacity:0.5;margin:0 auto;}
.mx-auto{max-width:340px;margin:0 auto;}
.agent-row{display:flex;justify-content:center;gap:6px;flex-wrap:wrap;margin-top:8px;}
.agent{border-radius:6px;padding:5px 8px;text-align:center;font-size:10px;font-weight:600;color:#f0f0f0;white-space:nowrap;}
.a-gray{background:#1a1a1a;border:0.8px solid #555;}
.a-teal{background:#0f2e26;border:0.8px solid #1D9E75;}
.a-blue{background:#0a1a2e;border:0.8px solid #185fa5;}
.a-amber{background:#2a1f00;border:0.8px solid #EF9F27;}
.side-row{display:flex;justify-content:center;gap:12px;align-items:flex-start;max-width:340px;margin:0 auto;}
.side-col{display:flex;flex-direction:column;align-items:center;}
</style>
</head>
<body>
<div class="wrap">
  <div class="label-top">QUERY</div>

  <!-- USER QUERY -->
  <div style="max-width:160px;margin:0 auto;">
    <div class="node n-gray">
      <div style="font-size:18px;margin-bottom:4px;">💬</div>
      <div class="title">User Query</div>
      <div class="sub">Chatbot</div>
    </div>
  </div>
  <div class="vline" style="height:14px;"></div>
  <div class="arr-y">↓</div>

  <!-- LANGGRAPH + vLLM SIDE BY SIDE -->
  <div class="side-row">

    <!-- LANGGRAPH -->
    <div class="side-col" style="flex:2;">
      <div class="n-lg" style="width:100%;">
        <div style="text-align:center;font-size:10px;letter-spacing:2px;color:#534ab7;font-family:monospace;margin-bottom:10px;">LANGGRAPH</div>
        <div class="node n-purple" style="margin-bottom:8px;">
          <div class="title" style="color:#a99ff0;">Manager Agent</div>
          <div class="sub">Understands · routes query</div>
        </div>
        <div class="vline" style="height:10px;"></div>
        <div class="arr-y" style="font-size:11px;">↓</div>
        <div class="agent-row">
          <div class="agent a-gray">Greeting</div>
          <div class="agent a-teal">RAG</div>
          <div class="agent a-blue">Summarize</div>
          <div class="agent a-amber">Concept retrieval</div>
        </div>
      </div>
    </div>

    <!-- connector -->
    <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding-top:40px;gap:4px;">
      <div style="font-size:10px;color:#FFD700;">↔</div>
      <div style="font-size:9px;color:#555;text-align:center;">calls</div>
    </div>

    <!-- vLLM + PostgreSQL -->
    <div class="side-col" style="flex:1;padding-top:10px;gap:10px;">
      <div class="node n-teal" style="width:100%;">
        <div class="title">vLLM</div>
        <div class="sub">GLM-4.7-Flash-AWQ</div>
      </div>
      <div style="font-size:9px;color:#555;text-align:center;margin:4px 0;">docs ↑</div>
      <div class="node n-blue" style="width:100%;">
        <svg width="18" height="18" viewBox="0 0 28 28" style="display:block;margin:0 auto 3px;">
          <ellipse cx="14" cy="13" rx="9" ry="9" fill="#336791" opacity="0.9"/>
          <path d="M19 17 Q24 19 23 24" fill="none" stroke="#336791" stroke-width="2.5" stroke-linecap="round"/>
          <circle cx="11" cy="11" r="1.5" fill="#0d0d0d"/>
          <ellipse cx="8" cy="10" rx="3.5" ry="4.5" fill="#336791" opacity="0.55"/>
        </svg>
        <div class="title" style="font-size:11px;color:#7db8d8;">PostgreSQL</div>
        <div class="sub" style="font-size:9px;">document feed</div>
      </div>
    </div>

  </div>

  <div class="vline" style="height:14px;"></div>
  <div class="arr-y">↓</div>

  <!-- GROUNDED ANSWER -->
  <div class="mx-auto">
    <div class="node n-green">
      <div style="font-size:18px;margin-bottom:4px;">✅</div>
      <div class="title">Grounded Answer</div>
      <div class="sub">Cited · streamed · with document source</div>
    </div>
  </div>

</div>
</body>
</html>
